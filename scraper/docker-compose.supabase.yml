version: "3.9"

services:
  # Scraper Service (Supabase Edition - No Local Database)
  scraper:
    build: .
    container_name: jbowall_scraper
    environment:
      # Supabase connection string
      # Format: postgresql://postgres.[PROJECT_ID]:[PASSWORD]@aws-0-[REGION].pooler.supabase.com:5432/postgres
      # Get this from Supabase Dashboard -> Settings -> Database -> Connection String (URI format)
      DATABASE_URL: ${DATABASE_URL}
      
      LOG_LEVEL: INFO
      LOG_FILE: logs/scraper.log
      SCRAPE_INTERVAL_MINUTES: 30
      ENABLE_SCHEDULER: "true"
      SCRAPER_MODE: server
      HEALTH_CHECK_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
